name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    permissions:
      contents: write # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Auto-increment version in app.json
        id: bump_version
        run: |
          node -e "
            const fs = require('fs');
            const app = require('./app.json');
            const currentVersion = app.expo.version || '1.0.0';
            const parts = currentVersion.split('.').map(Number);
            if (parts.length === 3) {
              parts[2] += 1;
            } else {
              parts.push(1);
            }
            const nextVersion = parts.join('.');
            app.expo.version = nextVersion;
            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('Next version calculated:', nextVersion);
            
            // Output to environment for subsequent steps
            fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + nextVersion + '\n');
          "

      - name: Install dependencies
        run: |
          set -o pipefail
          npm install 2>&1 | tee npm_install.log

      - name: Expo Prebuild (Generate iOS folder)
        run: |
          set -o pipefail
          npx expo prebuild --platform ios --clean 2>&1 | tee prebuild.log

      - name: Install CocoaPods
        run: |
          set -o pipefail
          cd ios
          pod install 2>&1 | tee ../pod_install.log

      - name: Build Unsigned App
        run: |
          set -o pipefail
          cd ios
          xcodebuild -workspace TuiTemplateNative.xcworkspace \
            -scheme TuiTemplateNative \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee ../xcodebuild.log

      - name: Package into IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv *.app Payload/
          zip -qr ../../../../../TuiTemplateNative.ipa Payload

      - name: Generate SideStore source.json
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          cat > sidestore.json << EOF
          {
            "name": "TuiTemplateNative",
            "identifier": "com.bootlegyouki.tuitemplatenative.source",
            "apps": [
              {
                "name": "TuiTemplateNative",
                "bundleIdentifier": "com.bootlegyouki.tuitemplatenative",
                "developerName": "BootlegYouki",
                "version": "${VERSION}",
                "versionDate": "${DATE}",
                "downloadURL": "https://github.com/${REPO}/releases/download/v${VERSION}/TuiTemplateNative.ipa",
                "localizedDescription": "Brutalist template using Native components.",
                "iconURL": "https://raw.githubusercontent.com/${REPO}/main/assets/icon.png",
                "tintColor": "00E5FF",
                "size": 0
              }
            ]
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: TuiTemplateNative v${{ env.VERSION }}
          body: |
            ## TuiTemplateNative v${{ env.VERSION }}
            
            ### Sideload via SideStore / Sideloadly / AltStore
            Download `TuiTemplateNative.ipa` below and sideload it.
            
            ### SideStore Source URL
            Add this source to SideStore for auto-updates:
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/sidestore.json
            ```
          files: |
            TuiTemplateNative.ipa
            sidestore.json
          draft: false
          prerelease: false

      - name: Commit updated app.json and sidestore.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json sidestore.json
          git stash
          git fetch origin main
          git rebase origin/main
          git stash pop
          git add app.json sidestore.json
          git diff --staged --quiet || git commit -m "chore: release v${VERSION} and update SideStore source [skip ci]"
          git push origin main

      - name: Report Build Errors
        if: failure()
        run: |
          echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Here is a summary of the errors encountered during the build process:" >> $GITHUB_STEP_SUMMARY
          
          # Check npm install log
          if [ -f npm_install.log ]; then
            if grep -qi "err" npm_install.log; then
              echo "#### 📦 npm install errors:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -i -C 2 "err" npm_install.log | tail -n 25 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # Check expo prebuild log
          if [ -f prebuild.log ]; then
            if grep -qi "error\|failed" prebuild.log; then
              echo "#### ⚙️ Expo Prebuild errors:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -i -C 2 "error\|failed" prebuild.log | tail -n 25 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # Check cocoa pods install log
          if [ -f pod_install.log ]; then
            if grep -qi "error\|failed" pod_install.log; then
              echo "#### 🍏 CocoaPods installation errors:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -i -C 2 "error\|failed" pod_install.log | tail -n 25 >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Check xcodebuild log
          if [ -f xcodebuild.log ]; then
            echo "#### 🛠️ Xcode compilation errors:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Xcode errors usually contain "error:" or "failed" or "note: build failed" or clang/swiftc errors
            grep -i -E "error:|failed|clang: error|swiftc: error" xcodebuild.log | tail -n 30 >> $GITHUB_STEP_SUMMARY
            
            # If nothing was written to summary from grep, fall back to last 30 lines of xcodebuild
            if [ $(wc -l < $GITHUB_STEP_SUMMARY) -lt 6 ]; then
              echo "Last 30 lines of compilation output:" >> $GITHUB_STEP_SUMMARY
              tail -n 30 xcodebuild.log >> $GITHUB_STEP_SUMMARY
            fi
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
