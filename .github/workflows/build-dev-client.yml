name: Build Unsigned iOS Dev Client IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Dev Client IPA
    runs-on: macos-latest
    permissions:
      contents: write # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Get current app version from app.json
        id: app_version
        run: |
          node -e "
            const app = require('./app.json');
            const version = app.expo.version || '1.0.0';
            console.log('App version:', version);
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + version + '\n');
          "

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned Dev Client App (Debug)
        run: |
          cd ios
          xcodebuild -workspace TuiTemplateNative.xcworkspace \
            -scheme TuiTemplateNative \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          cd ios/build/Build/Products/Debug-iphoneos
          mkdir Payload
          mv *.app Payload/
          zip -qr ../../../../../BetterExpo-DevClient.ipa Payload

      - name: Create GitHub Release for Dev Client
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-devclient
          name: BetterExpo Dev Client v${{ env.VERSION }}
          body: |
            ## BetterExpo Development Client v${{ env.VERSION }}
            
            This is a universal development client IPA preloaded with native libraries (Reanimated, Camera, Local Authentication, Share Extension, SQLite, etc.) matching this template's dependencies.
            
            ### Sideload via SideStore / AltStore / Sideloadly
            Download `BetterExpo-DevClient.ipa` below and sideload it.
            
            ### How to use:
            1. Open the Dev Client app on your device.
            2. Run `npm run start -- --dev-client` or `pnpm start --dev-client` in your local project directory.
            3. Connect by scanning the QR code or entering your local bundler URL (e.g. `exp://192.168.X.X:8081`) inside the app.
          files: |
            BetterExpo-DevClient.ipa
          draft: false
          prerelease: true
